[server]
host = "0.0.0.0"
port = 8000
provider = "local"
default_chat_model = "realai-default"
default_embedding_model = "realai-embed-default"
log_level = "debug"

[limits]
memory_mb = 512

[permissions]
tools = ["network", "filesystem", "code_exec", "web3"]

[web3]
solana_rpc_url = "https://api.mainnet-beta.solana.com"
evm_rpc_url = ""

