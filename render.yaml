services:
  - type: web
    name: realai-api
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python -m realai.api_server
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 10000
    healthCheckPath: /health
    routes:
      - type: rewrite
        source: /api/(.*)
        destination: /$1
      - type: rewrite
        source: /(.*)
        destination: /$1