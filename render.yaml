services:
  - type: web
    name: realai-api
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn apps.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    healthCheckPath: /healthz
    routes:
      - type: rewrite
        source: /api/(.*)
        destination: /$1
      - type: rewrite
        source: /(.*)
        destination: /$1
